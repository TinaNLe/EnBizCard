version: '3.8'

services:
  enbizcard:
    build: .
    container_name: enbizcard
    ports:
      - "${ENBIZCARD_PORT}:80"
    restart: always

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: enbizcard-dev
    ports:
      - "2221:2221"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      HOST: 0.0.0.0
      PORT: 2221
      CHOKIDAR_USEPOLLING: "true"
    command: npm run dev